name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            unzip \
            git \
            wget \
            patchelf

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==3.0.11

      - name: Clean previous build
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Show ThorVG recipe on failure
        if: failure()
        run: |
          FILE=$(find .buildozer -path "*libthorvg/__init__.py" | head -1)

          echo "RECIPE FILE:"
          echo "$FILE"

          if [ -f "$FILE" ]; then
            echo "========================"
            echo "LINES 70-120"
            echo "========================"
            nl -ba "$FILE" | sed -n '70,120p'
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: bin/*.apk
