name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk automake autoconf libltdl-dev libffi-dev libssl-dev zlib1g-dev libncurses5-dev
        pip3 install buildozer cython==3.0.11
    
    - name: Build APK with verbose output
      run: |
        buildozer -v android debug 2>&1 | tee build.log
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Upload full log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-apk
        path: bin/*.apk
        retention-days: 7
