name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk automake autoconf libltdl-dev libffi-dev libssl-dev zlib1g-dev libncurses5-dev patchelf
    
    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip setuptools wheel
        pip3 install buildozer cython==3.0.11
    
    - name: Clean previous builds
      run: |
        rm -rf .buildozer
        mkdir -p bin
    
    - name: Build APK with full log
      run: |
        buildozer android debug 2>&1 | tee build.log
        echo "BUILD_EXIT_CODE=$?" >> $GITHUB_ENV
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        P4A_BOOTSTRAP: sdl2
    
    - name: Upload full build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
    
    - name: Find APK file
      run: |
        find . -name "*.apk" -type f
        echo "APK_FILES=$(find . -name '*.apk' -type f | tr '\n' ',')" >> $GITHUB_ENV
    
    - name: Upload APK artifact
      if: env.APK_FILES != ''
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-apk
        path: |
          bin/*.apk
          **/bin/*.apk
        retention-days: 7
        if-no-files-found: warn
